---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-app
  template:
    metadata:
      labels:
        app: python-app
    spec:
      containers:
      - name: python-app
        image: cmtrieu/ci-cd-kubernetes-pipeline:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
